<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixed Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      height: 2000px;
      padding: 20px;
    }

    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 14px 18px;
      border-radius: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Position Fixed Example</h1>
  <p>Scroll this page and watch the chat button.</p>

  <div class="chat-button">Chat</div>
</body>
</html>
