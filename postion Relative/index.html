<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Position Relative Example</title>
  <style>
    .box {
      width: 150px;
      height: 80px;
      margin: 10px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    .box1 {
      background: #3498db;
    }

    .box2 {
      background: #e74c3c;
      position: relative;
      top: 20px;
      left: 30px;
    }

    .box3 {
      background: #2ecc71;
    }
  </style>
</head>
<body>
  <div class="box box1">Box 1</div>
  <div class="box box2">Box 2</div>
  <div class="box box3">Box 3</div>
</body>
</html>
