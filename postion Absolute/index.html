<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Badge Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .card {
      position: relative;
      width: 280px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: crimson;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">New</span>
    <h2>Product Card</h2>
    <p>This badge is placed using absolute positioning.</p>
  </div>
</body>
</html>
