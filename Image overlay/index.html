<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Position Card Hover</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="card-container">
    <div class="card">
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
        alt="Nature"
      />
      <div class="overlay">
        <h3>Beautiful Nature</h3>
        <p>This description slides up like a curtain when you hover.</p>
      </div>
    </div>

    <div class="card">
      <img
        src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80"
        alt="City"
      />
      <div class="overlay">
        <h3>Modern City</h3>
        <p>Absolute positioning helps place this overlay inside the card.</p>
      </div>
    </div>

    <div class="card">
      <img
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"
        alt="Beach"
      />
      <div class="overlay">
        <h3>Relaxing Beach</h3>
        <p>Hover effect with smooth CSS transition.</p>
      </div>
    </div>
  </div>
</body>
</html>
